name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.STAGING_WEBHOOK_SECRET }}
        run: |
          if [ -z "$WEBHOOK_SECRET" ]; then
            echo "::error::Add STAGING_WEBHOOK_SECRET to repo secrets (same value as server GITHUB_WEBHOOK_SECRET)."
            exit 1
          fi

          payload='{"ref":"refs/heads/main","repository":{"full_name":"Cutline-Tutoring/cutline-2.0"}}'
          signature="sha256=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"

          curl -fsS -X POST "https://staging.cutlinetutoring.nz/deploy-staging-webhook" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: ${signature}" \
            -d "$payload"

          echo "Staging deploy triggered."
